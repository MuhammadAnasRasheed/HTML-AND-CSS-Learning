<!-- 

Float:-
Simply flow the element left and right.

Clear:-
Used to clear a float. It specifies what element can float besides a given element.

CSS Flexbox:-
A better way to design a layout, alignment and distribute space among item in a container.

.)Main axis(according to flex direction.By default row.)
.)Cross axis(also according to flex direction)

Flex property for parent:-

.)Justify Content(Align element along main axis)
.)Align-item(Align element along cross axis)
.)Flex wrap
.)Align-content(Align a flex container line when there is a extra space in cross axis)

Flex property for child:-

.)order
.)align-self(default alignment overriden of items)
.)flex grow
.)flex shrink

.)Inline-flex:-
In this parent treat as inline and child items obeys flex properties. -->
