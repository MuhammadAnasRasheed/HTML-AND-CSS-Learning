<!-- 
CSS box model treats all html element as boxes.

margin collapse:-
when 2 margins from different elements overlap,the equivalent margin 
is the greater of two.

Box sizing:-

By default box size is content box in which padding and border is not
including in height and width.

For this we use border box in which padding and border is include in
height and width of element.it remove leaking of child div from parent
div

element height/width=height/width+border+padding.
whole box space= all things above + margin -->
