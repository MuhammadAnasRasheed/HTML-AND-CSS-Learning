<!-- 
What is HTML and why we used it?

HTML (HyperText Markup Language) is the standard language used to create
structure of web pages.It was created in 1991 by Tim Berners-Lee It 
uses tags to define elements like headings, paragraphs, images, and 
links in a browser.We use HTML to build the basic layout and skeleton of
a website before applying styling and interactivity. -->



<!-- 
why need index.html file conventionally?

index.html is the default file that web servers automatically look for 
when a user visits a website without specifying a file name. It acts as 
the main entry point (homepage), allowing the server to load the page 
without requiring a full URL path. While you can use other file names, 
they must be explicitly written in the URL, which is why index.html is 
preferred by convention. -->


<!-- 
Basic HTML Boiler Plate?

<!DOCTYPE html>  Declares the document type and tells the browser to use HTML5.
<html lang="en"> Root element of the page; lang helps with accessibility and SEO
<head> Contains metadata (not visible on the page) like title, charset, and viewport settings.            
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head> 
<body> Contains the actual content that is displayed in the browser.
</body> 
</html>  -->

<!-- 
When we make changes to a website using the browser’s inspect 
(developer tools), how do those changes work, and why do they disappear 
after refreshing the page?

When you make changes using the browser’s inspect tool, you are only 
modifying a temporary version of the webpage stored in your browser’s 
memory or DOM not the actual code on the server.These changes exist only
locally for your current session.When you refresh the page, the browser 
reloads the original data from the server, which removes all temporary 
changes.

example:-

When you take a photocopy of an original document, it is like the 
website content loaded in the browser.If you make changes on the 
photocopy, it only affects that copy, not the original document.When you
make a new photocopy again, it is fresh, so all previous changes 
disappear. -->
