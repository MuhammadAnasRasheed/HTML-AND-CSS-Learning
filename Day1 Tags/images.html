<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>images</title>
</head>
<body>
    <img src="https://www.cyberark.com/wp-content/uploads/2019/11/Developer.jpg" 
    alt="Developer pic" height="150" width="300"><hr>

<!-- 

There are 2 ways of importing images in a website using the <img> tag.

First way is directly importing from the internet using a URL.
Second way is first downloading the image locally and then importing it.
alt, src, height, and width are attributes of the <img> tag. -->
