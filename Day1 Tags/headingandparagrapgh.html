<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heading and Pragrapgh</title>
</head>
<body>
    <h1>This is <b>first</b> Heading</h1>
    <h2>This is <u>second</u> Heading</h2>
    <h3>This is <i>third</i> Heading</h3>
    <h4>This <sub>is</sub> fourth Heading</h4>
    <h5>This <sup>is</sup> fifth Heading</h5>
    <h6>This is six<br> Heading</h6><hr>
    <p><strong>This is paragrapgh</strong></p>
</body>
</html>
