Html Element:-

An HTML element includes the opening tag, content, and closing tag 
together.It represents everything written between the start and end of 
a tag. like <p>Hello</p>. -->

<!-- 
Attribute:-

An attribute is extra information added inside an HTML tag to modify 
its behavior or provide details. For example, "href" is an attribute of 
the <a> tag that specifies the link destination.

<a href="https://www.google.com">Click me</a>-->


<!-- 
Why do we need heading and paragraph tags when we can write text directly inside the body tag?

Yes, you can write text directly inside the body tag and it will still work, but it is not a good practice
because it does not give proper structure to your content. Using semantic tags like headings and 
paragraphs helps organize content in a meaningful way, making it easier to read and maintain. It is also 
important for SEO because search engines understand and rank well-structured, semantic content better. -->

<!-- 
What is semantic Tags?

Semantic tags are HTML tags that describe the meaning of content, such as <header>, <footer>, <section>, 
<article>, <nav>, <h1>–<h6>,<p>,<strong>and<em>.They are used to create a clear structure, improve 
readability, and help search engines understand your content better (SEO). -->

<!-- 
What does <span> tag do? Can you put multiple element inside a <span> Tags?

<span> is an inline tag used to style or target small parts of text within HTML content.
No, you should not put multiple or block-level elements inside <span>; it is only for inline text.
if you use block element like h or p in span so it may take out block element outside <span> Tag. -->

<!-- 
<b> and <strong>, <i> and <em> look the same visually, but <strong> and <em> are semantic tags.
They provide meaning (importance and emphasis) to content, which helps screen readers and SEO.
So, semantic tags are preferred over purely visual tags for better accessibility and structure. -->
