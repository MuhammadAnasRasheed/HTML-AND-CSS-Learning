<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre Tag</title>
</head>
<body>
    HTML builds the structure of a webpage.
    CSS styles the webpage.
    JavaScript adds interactivity.
<pre>
HTML builds the structure of a webpage.
CSS styles the webpage.
JavaScript adds interactivity.  
</pre>
</body>
</html>



<!-- 
HTML naturally ignores extra spaces and line breaks, so text is displayed in a single formatted flow.
But when we use the <pre> tag, HTML preserves all spaces and line breaks exactly as written.
So, <pre> is used when we want to display text exactly as it is. -->
