<!-- 
What is block, inline and inline block elements.

Block elements occupy the entire available width of their parent container and always start on a new line,
pushing subsequent content to the next line (e.g., <div>, <p>, <h1>).

Inline elements only take up as much width as their content requires and do not force line breaks, 
allowing them to sit side by side with other inline elements (e.g., <span>, <a>). We cannot set properties
of height and width in inline block.

Inline block element have same properties as inline but can set width and height properties of inline
block elements like (<img>). -->
