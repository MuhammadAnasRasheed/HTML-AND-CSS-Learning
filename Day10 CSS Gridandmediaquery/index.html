<!-- 
Css Grid:-
Use for layout design and structure.

Properties for parent container:-

.)grid template columns(set width and no of columns)
.)grid template rows(set width and no of rows)
.)Justify content(align whole grid horizontally)
.)align content(align whole grid vertically)
.)grid column gap
.)grid row gap
.)grid-gap:row col(shorthand for grid col gap and row gap)

Properties for child container:-

.) Grid col(how many col an item will span)
.) Grid row(how many row an item will span)
.) Also use 1/3 in this way in grid col or rows. Means start on 1
and end on 3. -->
