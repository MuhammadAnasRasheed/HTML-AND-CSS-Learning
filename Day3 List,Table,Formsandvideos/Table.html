<!DOCTYPE html>
<html>
<head>
    <title>Nested Table Example</title>
</head>
<body>

    <table border="1" cellpadding="5" cellspacing="0">
        <tr>
            <th>Name</th>
            <th>Details</th>
        </tr>
        <tr>
            <td>John</td>
            <td>
                <!-- Nested table starts here -->
                <table border="1" cellpadding="3" cellspacing="0">
                    <tr>
                        <th>Age</th>
                        <th>City</th>
                    </tr>
                    <tr>
                        <td>25</td>
                        <td>New York</td>
                    </tr>
                </table>
                <!-- Nested table ends here -->
            </td>
        </tr>
        <tr>
            <td>Emma</td>
            <td>No extra details</td>
        </tr>
    </table>

</body>
</html>
